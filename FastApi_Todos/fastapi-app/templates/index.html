<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #364038;
            --surface: #bec4c0;
            --border: #2a2a2a;
            --accent: #c8f056;
            --text: #545454;
            --muted: #666;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            padding: 48px 24px;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 400;
            color: var(--accent);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 48px;
        }

        h1::before {
            content: '> ';
            opacity: 0.5;
        }

        #todo-form {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        #todo-form input {
            flex: 1;
            min-width: 120px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #todo-form input:focus {
            border-color: var(--accent);
        }

        #todo-form input::placeholder { color: var(--muted); }

        #todo-form button {
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            padding: 10px 16px;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: opacity 0.2s;
        }

        #todo-form button:hover { opacity: 0.85; }

        #todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #todo-list li {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #todo-list li .todo-text {
            flex: 1;
            line-height: 1.4;
        }

        #todo-list li .todo-text .completed-badge {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--accent);
            margin-left: 8px;
            opacity: 0.7;
        }

        .btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            padding: 4px 10px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn:hover { border-color: var(--text); color: var(--text); }
        .btn.delete:hover { border-color: #ff5555; color: #ff5555; }

        .empty {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            padding: 24px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <form id="todo-form">
            <input type="text" id="title" placeholder="Title" required>
            <input type="text" id="description" placeholder="Description" required>
            <button type="submit">ADD</button>
        </form>
        <ul id="todo-list"></ul>
    </div>

    <script>
        async function fetchTodos() {
            const response = await fetch('/todos');
            const todos = await response.json();
            const todoList = document.getElementById('todo-list');
            todoList.innerHTML = '';

            if (todos.length === 0) {
                todoList.innerHTML = '<p class="empty">// no tasks yet</p>';
                return;
            }

            todos.forEach(todo => {
                const li = document.createElement('li');

                const text = document.createElement('span');
                text.className = 'todo-text';
                text.textContent = `${todo.title}: ${todo.description}`;
                if (todo.completed) {
                    const badge = document.createElement('span');
                    badge.className = 'completed-badge';
                    badge.textContent = '[done]';
                    text.appendChild(badge);
                }

                const editButton = document.createElement('button');
                editButton.className = 'btn';
                editButton.textContent = 'edit';
                editButton.onclick = () => editTodo(todo.id);

                const deleteButton = document.createElement('button');
                deleteButton.className = 'btn delete';
                deleteButton.textContent = 'del';
                deleteButton.onclick = () => deleteTodo(todo.id);

                li.appendChild(text);
                li.appendChild(editButton);
                li.appendChild(deleteButton);
                todoList.appendChild(li);
            });
        }

        async function editTodo(id) {
            const title = prompt('Enter new title:');
            const description = prompt('Enter new description:');
            const completed = confirm('Is this task completed?');
            const response = await fetch(`/todos/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, title, description, completed })
            });
            if (response.ok) fetchTodos();
        }

        async function deleteTodo(id) {
            const response = await fetch(`/todos/${id}`, { method: 'DELETE' });
            if (response.ok) fetchTodos();
        }

        document.getElementById('todo-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const response = await fetch('/todos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: Date.now(), title, description, completed: false })
            });
            if (response.ok) {
                event.target.reset();
                fetchTodos();
            }
        });

        fetchTodos();
    </script>
</body>
</html>
